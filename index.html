<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI Intelligence | Professional AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --sidebar-bg: #0d0d0d;
            --border: #262626;
            --text-main: #ececec;
            --accent: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-black); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* --- AKILLI SİDEBAR --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 10px;
            position: fixed; top: 0; left: 0; bottom: 0;
            transition: transform 0.3s ease; z-index: 1000;
            transform: translateX(-100%); /* Varsayılan kapalı */
        }
        .sidebar.open { transform: translateX(0); }

        .sidebar-header { margin-bottom: 10px; }
        .new-chat-btn {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
            background: transparent; color: white; cursor: pointer; text-align: left;
            font-size: 14px; display: flex; align-items: center; gap: 10px;
        }
        .new-chat-btn:hover { background: #1a1a1a; }

        .history-container { flex: 1; overflow-y: auto; margin-top: 20px; }
        .history-item {
            padding: 10px; border-radius: 8px; font-size: 13px; color: #b4b4b4;
            cursor: pointer; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: flex; align-items: center; gap: 10px;
        }
        .history-item:hover { background: #1a1a1a; color: white; }

        /* --- ANA EKRAN --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; transition: margin-left 0.3s ease; }
        
        /* Menü Butonu & Model Seçici */
        .nav-bar {
            padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
            position: absolute; top: 0; width: 100%; z-index: 500; background: rgba(0,0,0,0.8);
        }
        .menu-trigger { font-size: 20px; cursor: pointer; color: #888; }
        .menu-trigger:hover { color: white; }

        .model-selector {
            background: #202123; border: 1px solid var(--border); border-radius: 8px;
            padding: 5px 10px; color: white; font-size: 14px; outline: none;
        }

        /* Sohbet Alanı */
        .chat-view { flex: 1; overflow-y: auto; padding-top: 70px; padding-bottom: 150px; display: flex; flex-direction: column; }
        
        .row { width: 100%; display: flex; justify-content: center; padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .row.ai { background: #0a0a0a; }

        .inner { max-width: 750px; width: 100%; display: flex; gap: 20px; }
        .avatar { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; flex-shrink: 0; }
        .ai-avatar { background: white; color: black; }
        .user-avatar { background: #5436da; color: white; }

        /* Giriş Alanı */
        .input-area {
            position: absolute; bottom: 0; width: 100%; padding: 20px 0;
            background: linear-gradient(transparent, var(--bg-black) 50%);
            display: flex; flex-direction: column; align-items: center;
        }
        .input-box {
            max-width: 750px; width: 90%; background: #202123; border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 15px; display: flex; align-items: center; gap: 10px;
        }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 15px; }
        .send-icon { color: #555; cursor: pointer; transition: 0.2s; }
        .send-icon.active { color: white; }

        /* Kapatma Karartması */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            display: none; z-index: 900;
        }
        .overlay.show { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()"><i class="fa-solid fa-plus"></i> New Chat</button>
        </div>
        <div class="history-container" id="historyList">
            </div>
        <div style="font-size: 12px; color: #444; border-top: 1px solid #222; padding-top: 10px;">
            <i class="fa-solid fa-circle-user"></i> BLI Administrator
        </div>
    </div>

    <div class="main-content">
        <div class="nav-bar">
            <div class="menu-trigger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></div>
            <select class="model-selector" id="modelVer">
                <option value="3.4">BLI Intelligence 3.4</option>
                <option value="3.3">BLI Intelligence 3.3</option>
            </select>
            <div style="width: 20px;"></div>
        </div>

        <div class="chat-view" id="chatView">
            <div class="row ai">
                <div class="inner">
                    <div class="avatar ai-avatar">BI</div>
                    <div class="text">Sistem hazır. Taleplerinizi profesyonel bir dille iletebilirsiniz.</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Send a message..." onkeypress="if(event.key==='Enter') send()">
                <div class="send-icon" onclick="send()"><i class="fa-solid fa-paper-plane"></i></div>
            </div>
        </div>
    </div>

<script>
    let chatActive = false;
    let currentConversationTitle = "";

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }

    function newChat() {
        document.getElementById('chatView').innerHTML = `
            <div class="row ai"><div class="inner"><div class="avatar ai-avatar">BI</div><div class="text">Yeni bir oturum başlatıldı.</div></div></div>
        `;
        chatActive = false;
        currentConversationTitle = "";
        toggleSidebar();
    }

    function send() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;

        append(val, 'user');
        input.value = "";

        // Akıllı Başlık Oluşturma (Konuşmanın ilk mesajında)
        if(!chatActive) {
            createTitle(val);
            chatActive = true;
        }

        setTimeout(() => {
            const reply = getProResponse(val.toLowerCase());
            append(reply, 'ai');
        }, 800);
    }

    function createTitle(text) {
        // İlk mesajdan anlamlı bir başlık çıkar
        let title = text.length > 20 ? text.substring(0, 20) + "..." : text;
        if(text.includes("sipariş")) title = "Sipariş Sorgulama";
        if(text.includes("client")) title = "BLI Client Destek";
        if(text.includes("üye") || text.includes("ekip")) title = "Ekip Bilgileri";

        const list = document.getElementById('historyList');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<i class="fa-regular fa-message"></i> ${title}`;
        list.prepend(item);
    }

    function getProResponse(txt) {
        let lang = (/[açıöüşĞİ]/.test(txt)) ? "tr" : "en";
        const model = document.getElementById('modelVer').value;
        const prefix = `<b>[v${model}]:</b> `;

        if(txt.includes("sipariş") || txt.includes("order")) {
            return prefix + (lang === "tr" ? "Sistemde aktif bir siparişiniz bulunmamaktadır. Shopier panelini kontrol ediniz." : "No active orders found. Please check Shopier.");
        }
        if(txt.includes("client") || txt.includes("indir")) {
            return prefix + "Yazılım erişimi: <a href='https://bliesports.github.io/bliclient'>bliesports.github.io/bliclient</a>";
        }
        if(txt.includes("fatih") || txt.includes("çınar") || txt.includes("ekip")) {
            return prefix + "Yetkili Listesi: Fatih Erol (CEO), Çınar (Operations).";
        }
        return prefix + (lang === "tr" ? "Bu talep için yetkim sınırlı. Lütfen teknik konuları iletin." : "Limited access for this request. Please contact support.");
    }

    function append(text, sender) {
        const view = document.getElementById('chatView');
        const row = document.createElement('div');
        row.className = `row ${sender}`;
        row.innerHTML = `
            <div class="inner">
                <div class="avatar ${sender}-avatar">${sender === 'ai' ? 'BI' : 'U'}</div>
                <div class="text">${text}</div>
            </div>
        `;
        view.appendChild(row);
        view.scrollTop = view.scrollHeight;
    }
</script>
</body>
</html>
