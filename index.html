<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI INTELLIGENCE | Global AI Assistant</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bli-red: #ff3333;
            --bli-dark-red: #cc0000;
            --bg-black: #050505;
            --card-bg: #0f0f0f;
            --text-gray: #a0a0a0;
            --glow: 0 0 15px rgba(255, 51, 51, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Arka Plan Efekti */
        .bg-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255, 51, 51, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 51, 51, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle, black, transparent 80%);
        }

        .ai-wrapper {
            width: 95%; max-width: 900px;
            height: 85vh;
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Header */
        .ai-header {
            padding: 20px 30px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-brand { display: flex; align-items: center; gap: 15px; }
        .ai-brand img { height: 35px; filter: drop-shadow(var(--glow)); }
        .ai-brand h1 { font-family: 'Orbitron'; font-size: 16px; letter-spacing: 2px; }
        
        .status-badge {
            background: rgba(255, 51, 51, 0.1);
            color: var(--bli-red);
            border: 1px solid var(--bli-red);
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: 'Orbitron';
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .message {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai-message {
            background: #1a1a1a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #333;
        }

        .user-message {
            background: var(--bli-red);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            font-weight: 500;
        }

        /* Input Area */
        .input-box {
            padding: 25px 30px;
            background: #0c0c0c;
            border-top: 1px solid #222;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-box input {
            flex: 1;
            background: #151515;
            border: 1px solid #333;
            padding: 16px 20px;
            border-radius: 14px;
            color: white;
            font-family: 'Inter';
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus { border-color: var(--bli-red); background: #1a1a1a; }

        .send-btn {
            background: var(--bli-red);
            color: white;
            border: none;
            width: 50px; height: 50px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        .send-btn:hover { background: var(--bli-dark-red); transform: scale(1.05); }

        .loading-dots span {
            display: inline-block;
            width: 6px; height: 6px;
            background: var(--text-gray);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        a { color: #fff; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div class="ai-wrapper">
    <div class="ai-header">
        <div class="ai-brand">
            <img src="../logo1616.png" alt="BLI">
            <h1>BLI INTELLIGENCE</h1>
        </div>
        <div class="status-badge">Global Beta v2.0</div>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="message ai-message">
            <i class="fa-solid fa-robot" style="margin-right: 8px; color: var(--bli-red);"></i>
            Hello! I am BLI AI. How can I help you today? / Merhaba! Ben BLI Yapay Zeka, size nasıl yardımcı olabilirim?
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Ask anything... / Bir şey sor..." onkeypress="if(event.key==='Enter') handleSend()">
        <button class="send-btn" onclick="handleSend()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    // BLI Data & Logic
    const responses = {
        tr: {
            order: "Yakın bir zamanda alışveriş yapmadınız gibi görünüyor kanka. Ama gerçekten bir ürün aldıysan <a href='https://www.shopier.com/' target='_blank'>Shopier</a> üzerinden görüntüleyebilirsin.",
            members: "Kadromuz: <br>• FATİH EROL ***** <br>• ÇINAR ********* <br><br><a href='https://bliesports.github.io/recruitment'>Buradan başvurabilirsin!</a>",
            client: "BLI Client'ı hemen buradan indirebilirsin: <a href='https://bliesports.github.io/bliclient'>bliesports.github.io/bliclient</a>",
            unknown: "Kanka bu konuda bilgim yok maalesef. Sadece BLI Client, Siparişler ve Ekip hakkında konuşabilirim."
        },
        en: {
            order: "It seems you haven't made a purchase recently. If you did, you can check it via <a href='https://www.shopier.com/' target='_blank'>Shopier</a>.",
            members: "Our Core Team: <br>• FATİH EROL ***** <br>• ÇINAR ********* <br><br><a href='https://bliesports.github.io/recruitment'>Join us here!</a>",
            client: "You can download BLI Client here: <a href='https://bliesports.github.io/bliclient'>bliesports.github.io/bliclient</a>",
            unknown: "I'm sorry, I don't have information about this. I can only help with BLI Client, Orders, and Team info."
        }
    };

    function handleSend() {
        const val = userInput.value.trim();
        if (val === "") return;

        appendMsg(val, 'user-message');
        userInput.value = "";
        
        // AI Yazıyor... animasyonu
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-message loading-dots';
        loadingDiv.innerHTML = '<span></span><span></span><span></span>';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        setTimeout(() => {
            chatBox.removeChild(loadingDiv);
            const lowerVal = val.toLowerCase();
            
            // Dil algılama (Basit ama etkili)
            let lang = "en";
            if (/[açıöüşĞİ]/.test(lowerVal) || lowerVal.includes("nedir") || lowerVal.includes("nası")) lang = "tr";

            let reply = "";

            // Akıllı Kontrol
            if (lowerVal.includes("sipariş") || lowerVal.includes("order") || lowerVal.includes("kargo")) {
                reply = responses[lang].order;
            } else if (lowerVal.includes("üye") || lowerVal.includes("member") || lowerVal.includes("ekip") || lowerVal.includes("fatih") || lowerVal.includes("çınar")) {
                reply = responses[lang].members;
            } else if (lowerVal.includes("client") || lowerVal.includes("indir") || lowerVal.includes("download")) {
                reply = responses[lang].client;
            } else {
                reply = responses[lang].unknown;
            }

            appendMsg(reply, 'ai-message');
        }, 1200);
    }

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
