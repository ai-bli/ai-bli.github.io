<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI Intelligence | Professional AI Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --sidebar-bg: #0d0d0d;
            --border-color: #262626;
            --text-main: #ececec;
            --text-secondary: #b4b4b4;
            --accent-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-black); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar - Geçmiş Paneli */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 15px; transition: 0.3s;
        }

        .new-chat-btn {
            border: 1px solid var(--border-color); border-radius: 6px; padding: 12px;
            text-align: left; font-size: 14px; cursor: pointer; transition: 0.2s; margin-bottom: 20px;
        }
        .new-chat-btn:hover { background: #1a1a1a; }

        .history-list { flex: 1; overflow-y: auto; font-size: 13px; color: var(--text-secondary); }
        .history-item { padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: #1a1a1a; color: white; }

        /* Ana Sohbet Alanı */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Model Seçici - ChatGPT Stili */
        .model-selector {
            padding: 15px; display: flex; justify-content: center; border-bottom: 1px solid transparent;
            position: absolute; top: 0; width: 100%; z-index: 10;
        }

        .model-dropdown {
            background: #202123; border: 1px solid var(--border-color); border-radius: 8px;
            padding: 8px 15px; font-size: 14px; color: white; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        .chat-display {
            flex: 1; overflow-y: auto; padding-top: 80px; padding-bottom: 150px;
            display: flex; flex-direction: column; align-items: center;
        }

        .message-row { width: 100%; display: flex; justify-content: center; padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .message-row.ai { background: #0a0a0a; }

        .message-content { max-width: 750px; width: 100%; display: flex; gap: 20px; font-size: 15px; line-height: 1.6; }
        .avatar { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
        .ai-avatar { background: white; color: black; }
        .user-avatar { background: #5436da; color: white; }

        /* Alt Giriş Alanı */
        .input-wrapper {
            position: absolute; bottom: 0; width: 100%; padding: 20px 0;
            background: linear-gradient(transparent, var(--bg-black) 50%);
            display: flex; flex-direction: column; align-items: center;
        }

        .input-container {
            max-width: 750px; width: 90%; background: #202123; border: 1px solid var(--border-color);
            border-radius: 12px; padding: 12px 15px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 15px; }
        .send-btn { color: var(--text-secondary); cursor: pointer; transition: 0.2s; }
        .send-btn:hover { color: white; }

        .footer-note { font-size: 11px; color: #555; margin-top: 12px; }

        .beta-tag { font-size: 10px; background: #333; color: #ccc; padding: 2px 6px; border-radius: 4px; margin-left: 10px; }

        a { color: white; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="new-chat-btn"><i class="fa-solid fa-plus"></i> New Chat</div>
        <div class="history-list" id="history">
            <div class="history-item">BLI Client Information</div>
            <div class="history-item">Recruitment Procedures</div>
            <div class="history-item">Order Tracking Guide</div>
        </div>
    </div>

    <div class="main-chat">
        <div class="model-selector">
            <select class="model-dropdown" id="modelSelect">
                <option value="3.0">BLI 3.0 (Legacy)</option>
                <option value="3.1">BLI 3.1 (Stable)</option>
                <option value="3.2">BLI 3.2 (Creative)</option>
                <option value="3.3">BLI 3.3 (Pro Beta)</option>
                <option value="3.4" selected>BLI 3.4 (Advanced Alpha)</option>
            </select>
            <span class="beta-tag">BETA</span>
        </div>

        <div class="chat-display" id="chatDisplay">
            <div class="message-row ai">
                <div class="message-content">
                    <div class="avatar ai-avatar">BI</div>
                    <div class="text">How can I assist you today? Our systems are ready for your inquiries.</div>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Send a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <div class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></div>
            </div>
            <p class="footer-note">BLI Intelligence may provide info about BLI Esports services. Verify important data.</p>
        </div>
    </div>

<script>
    const chatDisplay = document.getElementById('chatDisplay');
    const userInput = document.getElementById('userInput');
    const modelSelect = document.getElementById('modelSelect');

    const responses = {
        tr: {
            order: "Sistemlerimizi kontrol ettiğimde yakın zamanda bir siparişiniz bulunmadığı görülüyor. Eğer bir satın alım gerçekleştirdiyseniz, <a href='https://www.shopier.com/' target='_blank'>Shopier</a> üzerinden detayları görüntüleyebilirsiniz.",
            members: "BLI Esports bünyesindeki yetkili kadromuz şu şekildedir: <br>• FATİH EROL ***** <br>• ÇINAR ********* <br><br>Başvuru işlemleri için <a href='https://bliesports.github.io/recruitment'>Recruitment</a> sayfamızı ziyaret edebilirsiniz.",
            client: "BLI Client yazılımına erişmek için resmi indirme sayfamızı kullanabilirsiniz: <a href='https://bliesports.github.io/bliclient'>bliesports.github.io/bliclient</a>",
            error: "Üzgünüm, bu konu hakkında detaylı bilgiye sahip değilim. Size BLI Client, sipariş durumları veya ekip bilgileri konusunda yardımcı olabilirim."
        },
        en: {
            order: "According to our records, you do not have any recent orders. If you have made a purchase, please check your status on <a href='https://www.shopier.com/' target='_blank'>Shopier</a>.",
            members: "Authorized personnel within BLI Esports: <br>• FATİH EROL ***** <br>• ÇINAR ********* <br><br>You may apply via <a href='https://bliesports.github.io/recruitment'>Recruitment</a> page.",
            client: "To access BLI Client software, please use our official download page: <a href='https://bliesports.github.io/bliclient'>bliesports.github.io/bliclient</a>",
            error: "I apologize, but I do not have information regarding this topic. I can assist you with BLI Client, order status, or team information."
        }
    };

    function sendMessage() {
        const text = userInput.value.trim();
        if (text === "") return;

        appendMessage(text, 'user');
        userInput.value = "";

        setTimeout(() => {
            const lowerText = text.toLowerCase();
            const currentModel = modelSelect.value;
            
            // Gerçek Dil Algılama (İngilizce kelimeler varsa İngilizce cevap verir)
            let lang = "tr";
            const englishKeywords = ["hello", "hi", "hey", "order", "what", "how", "who", "sorry", "client"];
            if (englishKeywords.some(word => lowerText.includes(word)) && !/[açıöüşĞİ]/.test(lowerText)) {
                lang = "en";
            }

            let reply = "";
            let prefix = currentModel >= 3.3 ? "[System v" + currentModel + "]: " : "";

            if (lowerText.includes("sipariş") || lowerText.includes("order")) {
                reply = prefix + responses[lang].order;
            } else if (lowerText.includes("üye") || lowerText.includes("member") || lowerText.includes("fatih") || lowerText.includes("çınar")) {
                reply = prefix + responses[lang].members;
            } else if (lowerText.includes("client") || lowerText.includes("indir") || lowerText.includes("download")) {
                reply = prefix + responses[lang].client;
            } else {
                reply = prefix + responses[lang].error;
            }

            appendMessage(reply, 'ai');
        }, 800);
    }

    function appendMessage(text, sender) {
        const row = document.createElement('div');
        row.className = `message-row ${sender}`;
        
        const content = `
            <div class="message-content">
                <div class="avatar ${sender}-avatar">${sender === 'ai' ? 'BI' : 'U'}</div>
                <div class="text">${text}</div>
            </div>
        `;
        
        row.innerHTML = content;
        chatDisplay.appendChild(row);
        chatDisplay.scrollTop = chatDisplay.scrollHeight;

        // Geçmişe ekle (Sadece kullanıcı mesajlarını)
        if(sender === 'user') {
            const hist = document.getElementById('history');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = text;
            hist.prepend(item);
        }
    }
</script>
</body>
</html>
